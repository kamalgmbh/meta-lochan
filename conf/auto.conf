# meta-lochan/conf/auto.conf

PREFERRED_PROVIDER_virtual/kernel = "linux-custom-lochan"
PREFERRED_VERSION_linux-custom-lochan = "6.15%"

DISTRO_FEATURES:append = " virtualization xen"

# Our custom 6.15 kernel builds these Xen bits in (=y), so the
# kernel-module-xen-* packages do not exist. Tell xen-image-minimal
# not to ask for them.
XEN_KERNEL_MODULES = ""

IMAGE_INSTALL:append = " \
    xen \
    xen-tools \
    xen-tools-xenstat \
    "
